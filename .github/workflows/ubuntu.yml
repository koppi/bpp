name: ubuntu

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  create-release:
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.gen.outputs.tag_name }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: false

      - name: Generate Tag Name
        id: gen
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "tag_name=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Create and Push Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "${{ steps.gen.outputs.tag_name }}"
          git push origin "${{ steps.gen.outputs.tag_name }}"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.gen.outputs.tag_name }}
          release_name: Release ${{ steps.gen.outputs.tag_name }}
          body: |
            Support BPP development: https://github.com/sponsors/koppi
          draft: false
          prerelease: false

  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - ubuntu-24.04
    runs-on: ${{ matrix.target }}
    steps:

    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: install devscripts
      run: |
        sudo apt update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt -qq -y install devscripts equivs lintian
        mk-build-deps -i -s sudo -t "apt --yes --no-install-recommends"

    - name: build source package
      env:
        DEBFULLNAME: "Jakob Flierl"
        DEBEMAIL: "jakob.flierl@gmail.com"
      run: |
        export TARGET=$(. /etc/lsb-release && echo $DISTRIB_CODENAME)
        VERSION="${{ needs.create-release.outputs.tag_name }}"
        dch --increment --distribution ${TARGET} -- "Automatic build"
        debuild -S -sa -us -uc -d

    - name: build binary package
      run: dpkg-buildpackage -b -us -uc

    - name: install binary package
      run: sudo dpkg -i ../bpp*deb || true

    - name: install package dependencies
      run: sudo apt -f install

    - name: run lintian
      run: lintian ../bpp*deb | lintian-info || true

    - name: upload artifacts
      run: |
        mkdir -p artifacts
        cp ../*.buildinfo ../*.changes ../*.dsc ../*.tar.* ../*.deb artifacts/ 2>/dev/null || true

    - uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.target }}
        if-no-files-found: error
        path: artifacts