name: ubuntu

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - ubuntu-24.04
    runs-on: ${{ matrix.target }}

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: install devscripts
      run: |
        sudo apt update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt -qq -y install devscripts equivs lintian
        mk-build-deps -i -s sudo -t "apt --yes --no-install-recommends"

    - name: build source package
      env:
        DEBFULLNAME: "Github Actions"
        DEBEMAIL: "jakob.flierl@gmail.com"
      run: |
        export TARGET=$(. /etc/lsb-release && echo $DISTRIB_CODENAME)
        VERSION="$(git describe --tags | sed -e "s/^v//" -e "s/-/+git/")"
        dch --create \
            --distribution ${TARGET} \
            --package bpp \
            --newversion ${VERSION}~${TARGET}1 \
            "Automatic build from Github" || true
        debuild -S -sa -us -uc -d

    - name: build binary package
      run: dpkg-buildpackage -b -us -uc

    - name: install binary package
      run: sudo dpkg -i ../bpp*deb || true

    - name: install package dependencies
      run: sudo apt -f install

    - name: run lintian
      run: lintian ../bpp*deb | lintian-info || true

    - name: upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.target }}
        if-no-files-found: error
        path: |
          *.buildinfo
          *.changes
          *.dsc
          *.tar.*
          *.deb
          ~/**/*/*.buildinfo
          ~/**/*/*.changes
          ~/**/*/*.dsc
          ~/**/*/*.tar.*
          ~/**/*/*.deb
